services:
  postgres:
    image: postgres:16-alpine
    container_name: dira-postgres
    environment:
      POSTGRES_USER: dira
      POSTGRES_PASSWORD: dira
      POSTGRES_DB: dira_news
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dira -d dira_news"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dira-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dira-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dira
      MINIO_ROOT_PASSWORD: dira-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
